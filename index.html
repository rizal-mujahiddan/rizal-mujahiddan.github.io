<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Rizal Mujahiddan</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 2rem;
      }
      header {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      main {
        padding: 1rem;
        border: 1px solid #ccc;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <header>Rizal Mujahiddan</header>
    <main class="checkData">Loading...</main>

    <script>
      const hasilkan_data = document.querySelector(".checkData");

      // Function to fetch and update data
      async function checkingData() {
        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/posts",
          );
          if (!response.ok) throw new Error("Failed to fetch API");
          const data = await response.json();

          // Pick a random post title to show dynamically
          const randomIndex = 2;
          hasilkan_data.innerHTML = data[randomIndex].title;
        } catch (error) {
          hasilkan_data.innerHTML = "Error fetching data: " + error.message;
        }
      }

      // Initial fetch
      checkingData();
    </script>
  </body>
</html>
